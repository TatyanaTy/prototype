name: Python CI with PyTest

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install PyTest
      run: pip install pytest
    
    - name: Run tests
      run: python -m pytest test_main.py -v
